<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        
    </style>
</head>
<body>
    <div class ="main-wrapper">
        <div class="left-panel">
            <div class="balance-card">
              <small>Total Balance</small>
              <h1 id="balance">₹0.00</h1>
            </div>
        
            <div id="budgetWarning">🚨 Budget Exceeded!</div>

            <div class="chart-container">
                <canvas id="expenseChart"></canvas>
            </div>
        </div>
        <div class="right-panel">
            <h3>Add Transaction</h3>
            <div class="form-group">
            <input type="text" id="text" placeholder="Entry name...">
            <input type="number" id="amount" placeholder="Amount (₹)" inputmode= "numeric">
            
            <select id="category">
                <option value="Food">🍲 Food</option>
                <option value="Transport">🚗 Transport</option>
                <option value="Rent">🏠 Bills</option>
                <option value="Entertainment">🎬 Entertainment</option>
                <option value="Salary">💰 Income</option>
            </select>

            <div class="type-toggle">
                <label><input type="radio" name="type" value="expense"> Expense</label>
                <label><input type="radio" name="type" value="income"> Income</label>
            </div>

            <button id="addBtn">Save Transaction</button>
        </div>
        <hr>
        <h3>Transaction History</h3>
        <input type="text" id="searchInput" placeholder="🔍 Search entries...">
        <ul id="list" class="list"></ul>
        </div>
    </div>
<script>
    const list = document.getElementById('list');
    const balance = document.getElementById('balance');
    const text = document.getElementById('text');
    const amount = document.getElementById('amount');
    const category = document.getElementById('category');
    const addBtn = document.getElementById('addBtn');
    const searchInput = document.getElementById('searchInput');
    const budgetWarning = document.getElementById('budgetWarning');

    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
    const BUDGET_LIMIT = 20000; // INR Budget Limit

    let myChart;
    
    const formatINR = (num) => {
        return '₹' + Number(num).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    };

    function updateChart() {
        const categories = ['Food', 'Transport', 'Bills', 'Entertainment'];
        const dataValues = categories.map(cat => {
            return transactions
            .filter(t => t.category.toLowerCase()=== cat.toLocaleLowerCase() && t.type === 'expense')
            .reduce((sum, t) => sum + t.amount, 0);
        });

        const ctx = document.getElementById('expenseChart').getContext('2d');
        if (myChart) {
            myChart.destroy();
        }

        myChart = new Chart(ctx,{
            type: 'doughnut',
            data: {
                labels: categories,
                datasets: [{
                    data: dataValues,
                    backgroundColor: [
                        '#FF6384',
                        '#36A2EB',
                        '#FFCE56',
                        '#4BC0C0'
                    ], hoverOffset: 30
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'bottom',
                    },
                    title: {
                        display: true,
                        text: 'Expense Distribution by Category'
                    }
                }
            }
        });

    };
    function render(filteredData = transactions){
        list.innerHTML = '';
        filteredData.forEach(t => {
            const isIncome = t.type === 'income';
            const item = document.createElement('li');
            item.classList.add(isIncome ? 'plus' : 'minus');

            item.innerHTML = `
            <div>
                    <strong>${t.text}</strong> <br>
                    <small style="color:#999">${t.date}</small> 
                    <span class="category-tag">${t.category}</span>
            </div>
            <span>
                ${isIncome ? '+' : '-'}${formatINR(t.amount)}
                <button class="delete-btn" onclick="removeTransaction(${t.id})">×</button>
            </span>
            `;
            list.appendChild(item);
        });

        balance.innerText = formatINR(currentBalance);
        balance.style.color = currentBalance < 0 ? '#ee5253' : '#10ac84';

        const totalExpenses = transactions
            .filter(t => t.type === 'expense')
            .reduce((acc, t) => acc + t.amount, 0);

        budgetWarning.style.display = totalExpenses > BUDGET_LIMIT ? 'block' : 'none';

        localStorage.setItem('transactions', JSON.stringify(transactions));
        updateChart();
    }

    addBtn.addEventListener('click', () => {
        if (text.value.trim() === '' || amount.value === '')
        return;

        const transaction = {
            id: Date.now(),
            text: text.value,
            amount: parseFloat(amount.value),
            category: category.value,
            type: document.querySelector('input[name="type"]:checked').value,
            date: new Date().toLocaleDateString('en-IN')
        };

        transactions.push(transaction);
        text.value = '';    
        amount.value = '';
        render();
    });
    searchInput.addEventListener('input', () => {
        const query = searchInput.value.toLowerCase();
        const filteredData = transactions.filter(t => 
            t.text.toLowerCase().includes(query) || 
            t.category.toLowerCase().includes(query)
        );
        render(filteredData);
    });
    function removeTransaction(id) {
        transactions = transactions.filter(t => t.id !== id);
        render();
    };
    render();
</script>
</body>
</html>
